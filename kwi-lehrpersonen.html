<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>KWI Lehrpersonen – Lernkarten</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 16px 40px;
    user-select: none;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #a0c4ff;
    margin-bottom: 6px;
    text-align: center;
  }

  .subtitle {
    font-size: 0.75rem;
    color: #667;
    margin-bottom: 24px;
    text-align: center;
  }

  /* Filter */
  .filter-bar {
    width: 100%;
    max-width: 420px;
    margin-bottom: 20px;
  }

  .filter-bar input {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #2d2d50;
    background: #12122a;
    color: #eee;
    font-size: 0.9rem;
    outline: none;
  }
  .filter-bar input:focus { border-color: #a0c4ff; }

  .fach-select {
    width: 100%;
    margin-top: 8px;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #2d2d50;
    background: #12122a;
    color: #eee;
    font-size: 0.9rem;
    outline: none;
  }

  /* Progress */
  .progress-bar-wrap {
    width: 100%;
    max-width: 420px;
    background: #12122a;
    border-radius: 20px;
    height: 6px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #a0c4ff, #6ef0d0);
    border-radius: 20px;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 0.72rem;
    color: #667;
    margin-bottom: 18px;
    text-align: center;
  }

  /* Card */
  .card-area {
    width: 100%;
    max-width: 420px;
    perspective: 1000px;
    cursor: pointer;
    margin-bottom: 20px;
  }

  .card-inner {
    position: relative;
    width: 100%;
    padding-bottom: 120%;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(.4,0,.2,1);
    border-radius: 18px;
  }

  .card-area.flipped .card-inner {
    transform: rotateY(180deg);
  }

  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    overflow: hidden;
  }

  .card-front {
    background: #12122a;
    border: 1px solid #2d2d50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .card-front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    filter: brightness(0.92);
  }

  .card-front .tap-hint {
    position: absolute;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55);
    color: #a0c4ff;
    font-size: 0.7rem;
    letter-spacing: 0.07em;
    padding: 5px 14px;
    border-radius: 20px;
    white-space: nowrap;
  }

  .card-back {
    background: #0f0f22;
    border: 1px solid #2d2d50;
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 24px;
    gap: 16px;
  }

  .card-back .name {
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    text-align: center;
    line-height: 1.3;
  }

  .card-back .fach {
    font-size: 0.85rem;
    color: #6ef0d0;
    text-align: center;
    letter-spacing: 0.04em;
    font-weight: 500;
  }

  .placeholder-icon {
    font-size: 5rem;
    opacity: 0.3;
  }

  /* Buttons */
  .nav-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 420px;
    margin-bottom: 12px;
  }

  .nav-btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    border: none;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: 0.02em;
  }
  .nav-btn:active { transform: scale(0.97); }
  .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }

  .btn-prev { background: #1e1e40; color: #a0c4ff; }
  .btn-next { background: #a0c4ff; color: #0d0d1f; }

  .shuffle-btn {
    width: 100%;
    max-width: 420px;
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #2d2d50;
    background: transparent;
    color: #667;
    font-size: 0.8rem;
    cursor: pointer;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
    margin-bottom: 6px;
  }
  .shuffle-btn:hover { color: #a0c4ff; border-color: #a0c4ff; }

  .count-label {
    font-size: 0.78rem;
    color: #445;
    text-align: center;
    margin-top: 4px;
  }

  .no-results {
    color: #445;
    font-size: 0.9rem;
    text-align: center;
    margin-top: 40px;
  }
</style>
</head>

</div>

const BASE = "https://www.kwi.ch/uploads/tx_tamrest/";

// Build Fach options
const allFaecher = new Set();
RAW.forEach(p => p.fach.split(', ').forEach(f => allFaecher.add(f.trim())));
const fachSelect = document.getElementById('fachSelect');
[...allFaecher].sort().forEach(f => {
  const o = document.createElement('option');
  o.value = f; o.textContent = f;
  fachSelect.appendChild(o);
});

let deck = [...RAW];
let filtered = [...deck];
let idx = 0;
let flipped = false;

function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const fach = document.getElementById('fachSelect').value;
  filtered = deck.filter(p => {
    const matchName = p.name.toLowerCase().includes(q);
    const matchFach = !fach || p.fach.includes(fach);
    return matchName && matchFach;
  });
  idx = 0;
  render();
}

function render() {
  const noResults = document.getElementById('noResults');
  const cardArea = document.getElementById('cardArea');
  if (filtered.length === 0) {
    noResults.style.display = 'block';
    cardArea.style.display = 'none';
    document.getElementById('progressLabel').textContent = 'Keine Ergebnisse';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('countLabel').textContent = '';
    return;
  }
  noResults.style.display = 'none';
  cardArea.style.display = 'block';

  const p = filtered[idx];
  const front = document.getElementById('cardFront');
  const back = document.getElementById('cardBack');

  // Reset flip
  flipped = false;
  cardArea.classList.remove('flipped');

  // Front: photo
  if (p.img) {
    front.innerHTML = `<img src="${BASE}${p.img}" alt="${p.name}" onerror="this.parentElement.innerHTML='<span class=\\'placeholder-icon\\'>👤</span><span class=\\'tap-hint\\'>Tippen zum Anschauen</span>'">
    <span class="tap-hint">Tippen zum Anschauen</span>`;
  } else {
    front.innerHTML = `<span class="placeholder-icon">👤</span><span class="tap-hint">Tippen zum Anschauen</span>`;
  }

  // Back: name + fach
  back.innerHTML = `<div class="name">${p.name}</div><div class="fach">${p.fach}</div>`;

  // Progress
  const pct = filtered.length > 1 ? (idx / (filtered.length - 1)) * 100 : 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `Karte ${idx + 1} von ${filtered.length}`;
  document.getElementById('countLabel').textContent = `${filtered.length} Lehrperson${filtered.length !== 1 ? 'en' : ''} gefiltert`;

  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === filtered.length - 1;
}

function flipCard() {
  flipped = !flipped;
  document.getElementById('cardArea').classList.toggle('flipped', flipped);
}

function navigate(dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= filtered.length) return;
  idx = newIdx;
  render();
}

function shuffle() {
  // Fisher-Yates
  for (let i = filtered.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
  }
  idx = 0;
  render();
}

// Keyboard support
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') navigate(1);
  else if (e.key === 'ArrowLeft') navigate(-1);
  else if (e.key === ' ') { e.preventDefault(); flipCard(); }
});

// Touch swipe
let touchStartX = 0;
document.getElementById('cardArea').addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('cardArea').addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  if (Math.abs(dx) > 50) navigate(dx < 0 ? 1 : -1);
  else flipCard();
}, {passive:true});

render();
</script>
